server {
    listen 80;

    # ── Archivos estáticos del frontend ──────────────────────────────────────
    location / {
        root /usr/share/nginx/html;

        # try_files: intenta servir el archivo exacto pedido ($uri),
        # luego el directorio ($uri/), y si no existe, devuelve index.html.
        # Esto es OBLIGATORIO para que React Router funcione:
        # sin esto, al refrescar /maintenances/5 Nginx devolvería 404
        # porque ese archivo no existe en disco — React Router no habría cargado aún.
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy inverso hacia el backend ───────────────────────────────────────
    # Toda petición que empiece con /api la redirige al backend internamente.
    # El browser nunca sabe que hay un servidor Node detrás — todo sale del puerto 80.
    location /api/ {
        # "backend" es el nombre del servicio en docker-compose.
        # Docker resuelve ese nombre como la IP interna del container.
        proxy_pass http://backend:3000;

        # Reenvía headers importantes al backend para que sepa
        # la IP real del cliente y el protocolo original.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Necesario para que las cookies httpOnly funcionen correctamente
        # cuando Nginx está delante del backend.
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tamaño máximo de body — importante para la subida de fotos.
        # Ajusta si los técnicos suben fotos muy grandes.
        client_max_body_size 20M;
    }
}
